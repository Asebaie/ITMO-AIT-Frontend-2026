<!doctype html>
<html lang="en">
<head>
 <title>UCL Tickets - Sign In</title>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
 <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
 <div class="container">
 <a class="navbar-brand" href="index.html">UCL Tickets</a>
 <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
 <span class="navbar-toggler-icon"></span>
 </button>
 <div class="collapse navbar-collapse" id="navMenu">
 <div class="navbar-nav ms-auto">
 <a class="nav-link" href="index.html">Home</a>
 <a class="nav-link" href="tickets.html">Tickets</a>
 <a class="nav-link" href="dashboard.html">My Account</a>
 <a class="nav-link active" href="login.html">Sign In</a>
 <a class="nav-link" href="register.html">Register</a>
 </div>
 </div>
 </div>
</nav>
<main class="container mt-5">
 <div class="row justify-content-center">
 <div class="col-md-5">
 <div class="card p-4">
 <h2 class="text-center mb-4">Sign In</h2>
 <form>
 <div class="mb-3">
 <label for="email" class="form-label">Email</label>
 <input type="email" class="form-control" id="email" placeholder="example@mail.com" required />
 </div>
 <div class="mb-3">
 <label for="password" class="form-label">Password</label>
 <input type="password" class="form-control" id="password" placeholder="Enter password" required />
 </div>
 <button type="submit" class="btn btn-primary w-100">Sign In</button>
 </form>
 <div class="text-center mt-3">
 <a href="register.html">No account? Register</a>
 </div>
 </div>
 </div>
 </div>
</main>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
