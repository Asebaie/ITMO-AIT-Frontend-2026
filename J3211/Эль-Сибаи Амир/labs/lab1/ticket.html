<!doctype html>
<html lang="en">
<head>
 <title>UCL Tickets - Match</title>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
 <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
 <div class="container">
 <a class="navbar-brand" href="index.html">UCL Tickets</a>
 <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
 <span class="navbar-toggler-icon"></span>
 </button>
 <div class="collapse navbar-collapse" id="navMenu">
 <div class="navbar-nav ms-auto">
 <a class="nav-link" href="index.html">Home</a>
 <a class="nav-link active" href="tickets.html">Tickets</a>
 <a class="nav-link" href="dashboard.html">My Account</a>
 <a class="nav-link" href="login.html">Sign In</a>
 <a class="nav-link" href="register.html">Register</a>
 </div>
 </div>
 </div>
</nav>
<main class="container mt-5 mb-5">
 <a href="tickets.html" class="btn btn-outline-secondary mb-4">Back to Tickets</a>
 <div id="matchCard" class="result-row mb-4" style="max-width:500px;border-radius:8px;"></div>
 <div class="row">
 <div class="col-md-6 mb-4">
 <div class="card">
 <div class="card-body">
 <h5 class="card-title mb-3">Match Info</h5>
 <p class="mb-1"><strong>Round:</strong> <span id="infoRound"></span></p>
 <p class="mb-1"><strong>Date:</strong> <span id="infoDate"></span></p>
 <p class="mb-1"><strong>Venue:</strong> <span id="infoVenue"></span></p>
 <p class="mb-1"><strong>Leg 1:</strong> <span id="infoLeg1"></span></p>
 <p class="mb-0"><strong>Leg 2:</strong> <span id="infoLeg2"></span></p>
 </div>
 </div>
 </div>
 <div class="col-md-6 mb-4">
 <div class="card">
 <div class="card-body">
 <h5 class="card-title mb-3">Buy Tickets</h5>
 <div class="mb-3">
 <label class="form-label">Category</label>
 <select class="form-select" id="category"></select>
 </div>
 <div class="mb-3">
 <label class="form-label">Quantity</label>
 <input type="number" class="form-control" id="qty" value="1" min="1" max="10" />
 </div>
 <p class="mb-3">Total: <strong id="totalPrice"></strong></p>
 <button type="button" class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#confirmModal">
 Buy Ticket
 </button>
 </div>
 </div>
 </div>
 </div>
 <div class="card mt-4">
 <div class="card-body">
 <h5 class="card-title mb-3">Reviews</h5>
 <div id="reviewsList"></div>
 </div>
 </div>
</main>
<div class="modal fade" id="confirmModal" tabindex="-1">
 <div class="modal-dialog modal-dialog-centered">
 <div class="modal-content">
 <div class="modal-header">
 <h5 class="modal-title">Confirm Purchase</h5>
 <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
 </div>
 <div class="modal-body">
 <p><strong id="modalMatch"></strong></p>
 <p>Date: <span id="modalDate"></span></p>
 <p>Category: <span id="modalCategory"></span></p>
 <p>Quantity: <span id="modalQty"></span></p>
 <p>Total: <strong id="modalTotal"></strong></p>
 <hr>
 <p class="text-muted mb-0">You must be signed in to complete purchase. <a href="login.html">Sign in</a></p>
 </div>
 <div class="modal-footer">
 <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
 <a href="login.html" class="btn btn-primary">Sign In to Buy</a>
 </div>
 </div>
 </div>
</div>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
