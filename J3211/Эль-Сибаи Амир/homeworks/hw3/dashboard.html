<!doctype html>
<html lang="en">
<head>
 <title>UCL Tickets - My Account</title>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
 <link rel="icon" href="data:;base64,iVBORw0KGgo=">
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
 <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
 <div class="container">
  <a class="navbar-brand" href="index.html">UCL Tickets</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Toggle navigation">
   <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navMenu">
   <div class="navbar-nav ms-auto">
    <a class="nav-link" href="index.html" data-icon="home">Home</a>
    <a class="nav-link" href="tickets.html" data-icon="tickets">Tickets</a>
    <a class="nav-link active" href="dashboard.html" data-icon="user">My Account</a>
    <a class="nav-link" href="login.html">Sign In</a>
    <a class="nav-link" href="register.html">Register</a>
   </div>
  </div>
 </div>
</nav>

<main class="container mt-5 mb-5">
 <h1 class="mb-3">My Account</h1>
 <p class="mb-4" id="welcomeText">Welcome. Here is your account overview.</p>

 <div class="row mb-4">
  <div class="col-md-4 mb-3">
   <div class="card"><div class="card-body">
    <h5 class="card-title">Tickets Purchased</h5>
    <p class="card-text">Total: <strong id="statTickets">0</strong></p>
   </div></div>
  </div>
  <div class="col-md-4 mb-3">
   <div class="card"><div class="card-body">
    <h5 class="card-title">Amount Spent</h5>
    <p class="card-text">Total: <strong id="statSpent">€0</strong></p>
   </div></div>
  </div>
  <div class="col-md-4 mb-3">
   <div class="card"><div class="card-body">
    <h5 class="card-title">Refunds</h5>
    <p class="card-text">Total: <strong id="statRefunds">0</strong></p>
   </div></div>
  </div>
 </div>

 <ul class="nav nav-tabs mb-4" id="dashTabs" role="tablist">
  <li class="nav-item">
   <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#myTickets">My Tickets</button>
  </li>
  <li class="nav-item">
   <button class="nav-link" data-bs-toggle="tab" data-bs-target="#mySettings">Settings</button>
  </li>
  <li class="nav-item" id="sellTabItem" style="display:none;">
   <button class="nav-link" data-bs-toggle="tab" data-bs-target="#myListings">Sell Tickets</button>
  </li>
 </ul>

 <div class="tab-content">
  <div class="tab-pane fade show active" id="myTickets">
   <div class="results-grid" id="userTicketsGrid"></div>
  </div>

  <div class="tab-pane fade" id="mySettings">
   <div class="card mb-4">
    <div class="card-body">
     <h5 class="card-title mb-3">Personal Details</h5>
     <div class="row g-3" style="max-width:500px;">
      <div class="col-6">
       <label class="form-label" for="editFirstName">First Name</label>
       <input type="text" id="editFirstName" class="form-control">
      </div>
      <div class="col-6">
       <label class="form-label" for="editLastName">Last Name</label>
       <input type="text" id="editLastName" class="form-control">
      </div>
      <div class="col-12">
       <label class="form-label" for="editEmail">Email</label>
       <input type="email" id="editEmail" class="form-control">
      </div>
      <div class="col-12">
       <button class="btn btn-primary me-2" id="saveProfileBtn">Save Changes</button>
       <a href="login.html" class="btn btn-outline-danger me-2" id="signOutBtn" data-icon="logout">Sign Out</a>
       <button class="btn btn-outline-warning" id="becomeOrgBtn" onclick="becomeOrganizer()">Become Organizer</button>
      </div>
     </div>
    </div>
   </div>

   <div class="card">
    <div class="card-body">
     <h5 class="card-title mb-3">Security</h5>
     <div class="row g-3" style="max-width:500px;">
      <div class="col-12">
       <label class="form-label" for="newPassword">New Password</label>
       <input type="password" id="newPassword" class="form-control" placeholder="Enter new password">
      </div>
      <div class="col-12">
       <label class="form-label" for="confirmNewPassword">Confirm New Password</label>
       <input type="password" id="confirmNewPassword" class="form-control" placeholder="Repeat new password">
      </div>
      <div class="col-12">
       <button class="btn btn-outline-primary" id="changePassBtn">Update Password</button>
      </div>
     </div>
    </div>
   </div>
  </div>

  <div class="tab-pane fade" id="myListings">
   <div class="card">
    <div class="card-body">
     <h5 class="card-title mb-3">List Tickets for Sale</h5>
     <div class="row g-3 mb-4" style="max-width:600px;">
      <div class="col-12">
       <label class="form-label" for="sellMatch">Match</label>
       <select class="form-select" id="sellMatch">
        <option value="">Select match...</option>
       </select>
      </div>
      <div class="col-md-4">
       <label class="form-label" for="sellCategory">Category</label>
       <select class="form-select" id="sellCategory">
        <option>Standard</option><option>Business</option><option>VIP Box</option>
       </select>
      </div>
      <div class="col-md-4">
       <label class="form-label" for="sellPrice">Price (€)</label>
       <input type="number" class="form-control" id="sellPrice">
      </div>
      <div class="col-md-4">
       <label class="form-label" for="sellQty">Quantity</label>
       <input type="number" class="form-control" id="sellQty">
      </div>
      <div class="col-12">
       <button class="btn btn-primary" onclick="listTickets()">List Tickets</button>
      </div>
     </div>
     <div id="myListingsTable" style="display:none;">
      <h6 class="text-muted mb-3">My Active Listings</h6>
      <div class="table-responsive">
       <table class="table table-striped">
        <thead><tr><th>Match</th><th>Category</th><th>Price</th><th>Qty</th><th></th></tr></thead>
        <tbody id="listingRows"></tbody>
       </table>
      </div>
     </div>
    </div>
   </div>
  </div>
 </div>
</main>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
